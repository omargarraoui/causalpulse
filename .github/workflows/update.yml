name: update

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/update.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: causalpulse-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      # The article cache and embedding cache are intermediate state that we
      # don't want to inflate the repo with, but they cut NewsAPI.ai token
      # spend and re-embedding work across scheduled runs. Actions cache is
      # the right home for them.
      - name: Restore pipeline cache
        if: github.event_name != 'push'
        uses: actions/cache@v4
        with:
          path: |
            data/raw/articles.jsonl
            data/embeddings.npz
          key: causalpulse-pipeline-${{ github.run_id }}
          restore-keys: causalpulse-pipeline-

      - name: Refresh data
        if: github.event_name != 'push'
        env:
          NEWSAPI_AI_KEY: ${{ secrets.NEWSAPI_AI_KEY }}
        run: python -m scripts.export

      - name: Commit data
        id: commit
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: scheduled refresh"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          mkdir -p public
          cp ../data/data.json public/data.json
          npm install --no-audit --no-fund
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
